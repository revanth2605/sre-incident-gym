name: SRE-Incident-Gym
version: 1.0.0
entry_point: main:app
description: A real-world SRE simulator for training incident response agents.

# Environment metadata
metadata:
  author: OpenEnv Hackathon Participant
  license: MIT
  tags:
    - sre
    - incident-response
    - devops
    - reinforcement-learning
  
# Task definitions
tasks:
  task_1:
    name: Easy - Service Restart
    description: Restart a crashed service to bring it from status 500 to 200
    difficulty: easy
    max_steps: 50
    
  task_2:
    name: Medium - CPU Scaling
    description: Scale up the service to reduce high CPU load from 99% to 20% or below
    difficulty: medium
    max_steps: 50
    
  task_3:
    name: Hard - Security & Performance
    description: Both scale up to reduce CPU load AND apply a security patch
    difficulty: hard
    max_steps: 50

# Observation space
observation_space:
  type: object
  properties:
    status_code:
      type: integer
      description: HTTP status code of the service (100-599)
      min: 100
      max: 599
    cpu_load:
      type: number
      description: CPU load percentage (0-100)
      min: 0.0
      max: 100.0
    memory_usage:
      type: number
      description: Memory usage percentage (0-100)
      min: 0.0
      max: 100.0
    last_log_entry:
      type: string
      description: Most recent log entry from the service
    is_patched:
      type: boolean
      description: Whether the security patch is applied

# Action space
action_space:
  type: object
  description: Discriminated union of possible actions
  variants:
    check_logs:
      type: object
      properties:
        action_type:
          type: string
          enum: ["check_logs"]
      description: Retrieve and analyze service logs
      
    restart_service:
      type: object
      properties:
        action_type:
          type: string
          enum: ["restart_service"]
      description: Restart the microservice
      
    scale_up:
      type: object
      properties:
        action_type:
          type: string
          enum: ["scale_up"]
        replicas:
          type: integer
          min: 1
          max: 10
          description: Number of additional replicas to provision
      description: Horizontally scale the service to handle increased load
      
    apply_patch:
      type: object
      properties:
        action_type:
          type: string
          enum: ["apply_patch"]
        patch_id:
          type: string
          description: Identifier of the patch to apply
      description: Deploy a patch to fix vulnerabilities or bugs
      
    nop:
      type: object
      properties:
        action_type:
          type: string
          enum: ["nop"]
      description: Take no action and observe the environment

# Reward space
reward_space:
  type: object
  properties:
    value:
      type: number
      description: Reward value in range [0.0, 1.0]
      min: 0.0
      max: 1.0

# Reward policy
reward_policy:
  dense: true
  diagnostic_actions: 0.2
  solving_actions: 0.8
  max_episode_reward: "unlimited"
  description: Dense reward system - 0.2 for diagnostic actions like check_logs, 0.8 for solving task goals

# Server configuration
server:
  host: 0.0.0.0
  port: 7860
  protocol: http

# API endpoints
endpoints:
  reset:
    path: /reset
    method: POST
    description: Reset environment to initial state
    
  step:
    path: /step
    method: POST
    description: Execute one step with an action
    
  state:
    path: /state
    method: GET
    description: Get full environment state
    
  health:
    path: /health
    method: GET
    description: Health check endpoint

# Environment properties
properties:
  deterministic: true
  stochastic: false
  max_steps_per_episode: 50
  seed_support: true
  
# Dependencies
dependencies:
  - fastapi>=0.104.0
  - uvicorn>=0.24.0
  - pydantic>=2.5.0
  - openai>=1.3.0
